<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智链云汇 — 我的订阅</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            background:
                linear-gradient(135deg, rgba(239, 246, 255, 0.96), rgba(245, 243, 255, 0.92) 44%, rgba(236, 254, 255, 0.86)),
                #f6f8ff;
            color: #07133d;
            font-family: Arial, "Helvetica Neue", sans-serif;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .page {
            width: min(1180px, 100%);
            margin: 0 auto;
            padding: 24px 20px 46px;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 18px;
            margin-bottom: 28px;
        }

        .brand {
            display: inline-flex;
            align-items: center;
            gap: 12px;
        }

        .brand img {
            width: 42px;
            height: 42px;
        }

        .brand strong,
        .brand small {
            display: block;
        }

        .brand strong {
            font-size: 22px;
            line-height: 1.1;
        }

        .brand small {
            margin-top: 4px;
            color: #61708f;
            font-size: 12px;
        }

        .home-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 38px;
            padding: 0 16px;
            border: 1px solid rgba(37, 99, 235, 0.24);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.72);
            color: #2563eb;
            font-size: 14px;
            font-weight: 800;
        }

        .hero {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 280px;
            gap: 18px;
            align-items: stretch;
            margin-bottom: 18px;
        }

        .hero-main,
        .summary-card,
        .order-item,
        .message {
            border: 1px solid rgba(86, 111, 185, 0.18);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.92);
            box-shadow: 0 12px 32px rgba(43, 73, 148, 0.09);
        }

        .hero-main {
            padding: 28px;
        }

        .eyebrow {
            display: inline-flex;
            align-items: center;
            min-height: 28px;
            padding: 0 10px;
            border-radius: 8px;
            background: rgba(37, 99, 235, 0.1);
            color: #2563eb;
            font-size: 13px;
            font-weight: 800;
        }

        .title {
            margin-top: 14px;
            color: #07133d;
            font-size: clamp(30px, 4vw, 46px);
            line-height: 1.16;
        }

        .subtitle {
            margin-top: 12px;
            color: #61708f;
            font-size: 15px;
            line-height: 1.7;
        }

        .summary-card {
            display: grid;
            align-content: center;
            gap: 14px;
            padding: 24px;
        }

        .summary-card span {
            color: #61708f;
            font-size: 13px;
            font-weight: 700;
        }

        .summary-card strong {
            color: #2563eb;
            font-size: 34px;
            line-height: 1;
        }

        .order-list {
            display: grid;
            gap: 12px;
        }

        .order-item {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 16px;
            align-items: center;
            padding: 18px;
        }

        .order-main {
            min-width: 0;
        }

        .order-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            min-width: 0;
        }

        .product-name {
            overflow: hidden;
            color: #07133d;
            font-size: 17px;
            font-weight: 800;
            line-height: 1.4;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .meta {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px 18px;
            margin-top: 14px;
            color: #4b5b7d;
            font-size: 13px;
            line-height: 1.5;
        }

        .meta span {
            overflow-wrap: anywhere;
        }

        .amount {
            color: #2563eb;
            font-size: 17px;
            font-weight: 900;
        }

        .status {
            display: inline-flex;
            align-items: center;
            min-height: 26px;
            padding: 0 10px;
            border-radius: 999px;
            background: #eef2ff;
            color: #3730a3;
            font-size: 12px;
            font-weight: 800;
            white-space: nowrap;
        }

        .status.refunded {
            background: #ecfdf5;
            color: #047857;
        }

        .status.closed {
            background: #f3f4f6;
            color: #4b5563;
        }

        .actions {
            display: flex;
            align-items: center;
            justify-content: flex-end;
        }

        .refund-btn,
        .load-more {
            min-height: 38px;
            border: none;
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
            font-size: 14px;
            font-weight: 800;
        }

        .refund-btn {
            min-width: 86px;
            padding: 0 18px;
            background: linear-gradient(135deg, #f97316, #ef4444);
        }

        .refund-btn:disabled,
        .load-more:disabled {
            cursor: not-allowed;
            opacity: 0.55;
        }

        .footer {
            display: flex;
            justify-content: center;
            padding-top: 18px;
        }

        .load-more {
            width: min(280px, 100%);
            background: linear-gradient(135deg, #2563eb, #7c3aed);
        }

        .message {
            padding: 28px 14px;
            color: #61708f;
            text-align: center;
        }

        @media (max-width: 780px) {
            .page {
                padding: 18px 12px 34px;
            }

            .topbar,
            .hero {
                grid-template-columns: 1fr;
            }

            .topbar {
                align-items: flex-start;
                flex-direction: column;
            }

            .order-item {
                grid-template-columns: 1fr;
            }

            .order-head {
                align-items: flex-start;
                flex-direction: column;
            }

            .meta {
                grid-template-columns: 1fr;
            }

            .actions {
                justify-content: flex-start;
            }

            .refund-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
<main class="page">
    <header class="topbar">
        <a class="brand" href="index.html">
            <img src="./images/logo.png" alt="">
            <span>
                <strong>智链云汇</strong>
                <small>AI 服务订阅 & 拼团采购平台</small>
            </span>
        </a>
        <a class="home-link" href="index.html">返回服务商城</a>
    </header>

    <section class="hero">
        <div class="hero-main">
            <span class="eyebrow">我的订阅</span>
            <h1 class="title">订阅订单与退订管理</h1>
            <p class="subtitle">查看 AI 服务订阅订单、支付状态和退订入口。退订会沿用后端当前退款与权益撤销规则。</p>
        </div>
        <div class="summary-card">
            <span>订单列表</span>
            <strong id="orderCount">0</strong>
            <span>已加载订单</span>
        </div>
    </section>

    <section id="orderList" class="order-list"></section>
    <div id="message" class="message">加载中...</div>
    <div class="footer">
        <button id="loadMore" class="load-more" type="button" hidden>加载更多</button>
    </div>
</main>

<script>
    const sPayMallUrl = "";
    const pageSize = 10;
    let lastId = null;
    let hasMore = false;
    let loading = false;

    const orderListEl = document.getElementById("orderList");
    const messageEl = document.getElementById("message");
    const loadMoreBtn = document.getElementById("loadMore");
    const orderCountEl = document.getElementById("orderCount");

    function getCookie(name) {
        const cookieArr = document.cookie.split(";");
        for (let i = 0; i < cookieArr.length; i++) {
            const cookiePair = cookieArr[i].split("=");
            if (name === cookiePair[0].trim()) {
                return decodeURIComponent(cookiePair[1]);
            }
        }
        return null;
    }

    function formatAmount(value) {
        if (value === null || value === undefined || value === "") {
            return "0.00";
        }
        return Number(value).toFixed(2);
    }

    function escapeHtml(value) {
        if (value === null || value === undefined) {
            return "-";
        }
        return String(value)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#39;");
    }

    function statusClass(status) {
        if (status === "REFUNDED") return "refunded";
        if (status === "CLOSE") return "closed";
        return "";
    }

    function refreshOrderCount() {
        orderCountEl.textContent = orderListEl.children.length;
    }

    function renderOrder(order) {
        const item = document.createElement("article");
        item.className = "order-item";
        item.dataset.orderId = order.orderId;

        const amount = order.payAmount || order.totalAmount;
        item.innerHTML = `
            <div class="order-main">
                <div class="order-head">
                    <div class="product-name">${escapeHtml(order.productName)}</div>
                    <span class="status ${statusClass(order.status)}">${escapeHtml(order.statusDesc || order.status)}</span>
                </div>
                <div class="meta">
                    <span>订单号：${escapeHtml(order.orderId)}</span>
                    <span>金额：<strong class="amount">¥${formatAmount(amount)}</strong></span>
                    <span>创建时间：${escapeHtml(order.createTime)}</span>
                    <span>订单状态：${escapeHtml(order.status || "-")}</span>
                </div>
            </div>
            <div class="actions"></div>
        `;

        const actions = item.querySelector(".actions");
        if (order.canRefund) {
            const refundBtn = document.createElement("button");
            refundBtn.className = "refund-btn";
            refundBtn.type = "button";
            refundBtn.textContent = "退订";
            refundBtn.addEventListener("click", () => refundOrder(order.orderId, item));
            actions.appendChild(refundBtn);
        }

        orderListEl.appendChild(item);
        refreshOrderCount();
    }

    function updateMessage(text, visible) {
        messageEl.textContent = text;
        messageEl.hidden = !visible;
    }

    function updateLoadMore() {
        loadMoreBtn.hidden = !hasMore;
        loadMoreBtn.disabled = loading;
    }

    function loadOrders() {
        if (loading) return;
        loading = true;
        updateLoadMore();
        updateMessage(orderListEl.children.length === 0 ? "加载中..." : "", orderListEl.children.length === 0);

        fetch(sPayMallUrl + "/api/v1/alipay/query_user_order_list", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                userId: userId,
                lastId: lastId,
                pageSize: pageSize
            })
        })
        .then(response => response.json())
        .then(json => {
            if (json.code !== "0000") {
                updateMessage(json.info || "订单加载失败", true);
                return;
            }

            const data = json.data || {};
            const orders = data.orderList || [];
            orders.forEach(renderOrder);
            lastId = data.lastId || null;
            hasMore = data.hasMore === true;

            if (orderListEl.children.length === 0) {
                updateMessage("暂无订单", true);
            } else {
                updateMessage("", false);
            }
        })
        .catch(error => {
            console.error("订单加载失败:", error);
            updateMessage("订单加载失败", true);
        })
        .finally(() => {
            loading = false;
            updateLoadMore();
            refreshOrderCount();
        });
    }

    function refundOrder(orderId, item) {
        if (!confirm("确认退订？已消耗额度将按比例退款。")) {
            return;
        }

        const button = item.querySelector(".refund-btn");
        if (button) {
            button.disabled = true;
        }

        fetch(sPayMallUrl + "/api/v1/alipay/refund_order", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                userId: userId,
                orderId: orderId
            })
        })
        .then(response => response.json())
        .then(json => {
            if (json.code !== "0000") {
                alert(json.info || "退订失败，请稍后重试");
                if (button) button.disabled = false;
                return;
            }

            const data = json.data || {};
            const statusEl = item.querySelector(".status");
            statusEl.textContent = data.statusDesc || data.status || "已退单";
            statusEl.className = "status refunded";
            const actions = item.querySelector(".actions");
            actions.innerHTML = "";
        })
        .catch(error => {
            console.error("退单失败:", error);
            alert("退订失败，请稍后重试");
            if (button) button.disabled = false;
        });
    }

    const userId = getCookie("loginToken");
    if (!userId) {
        window.location.href = "login.html";
    } else {
        loadMoreBtn.addEventListener("click", loadOrders);
        document.addEventListener("DOMContentLoaded", loadOrders);
    }
</script>
</body>
</html>
