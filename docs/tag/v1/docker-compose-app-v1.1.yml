name: ai-service-commerce-platform

# 先启动基础设施：docker compose -f docker-compose-environment.yml up -d
# 再启动应用：docker compose -f docker-compose-app-v1.1.yml up -d
services:
  # 部署前端项目
  group-buy-market-front:
    image: registry.cn-hangzhou.aliyuncs.com/xfg-studio/nginx:latest
    container_name: ai-service-commerce-platform-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/html:/usr/share/nginx/html
      - ./nginx/conf/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/conf/conf.d:/etc/nginx/conf.d
    privileged: true
    networks:
      - commerce-network

  # 部署后端项目 - 小型支付商城
  s-pay-mall-app:
    image: lipeicheng/s-pay-mall-ddd-lpc-app:1.2
    container_name: ai-service-commerce-platform-s-pay-mall-app
    restart: on-failure
    expose:
      - "8080"
    environment:
      - TZ=PRC
      - SPRING_PROFILES_ACTIVE=prod
      - SERVER_PORT=8080
      - APP_CONFIG_GROUP_BUY_MARKET_API_URL=http://group-buy-market-front
      - APP_CONFIG_GROUP_BUY_MARKET_NOTIFY_URL=http://s-pay-mall-app:8080/api/v1/alipay/group_buy_notify
      - SPRING_DATASOURCE_USERNAME=${MYSQL_USERNAME:-root}
      - SPRING_DATASOURCE_PASSWORD=${MYSQL_ROOT_PASSWORD:-123456}
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/s-pay-mall?characterEncoding=utf8&autoReconnect=true&serverTimezone=Asia/Shanghai
      - SPRING_DATASOURCE_DRIVER_CLASS_NAME=com.mysql.cj.jdbc.Driver
      - SPRING_HIKARI_POOL_NAME=Retail_HikariCP
      - SPRING_RABBITMQ_ADDRESSES=rabbitmq
      - SPRING_RABBITMQ_PORT=5672
      - SPRING_RABBITMQ_USERNAME=${RABBITMQ_DEFAULT_USER:-admin}
      - SPRING_RABBITMQ_PASSWORD=${RABBITMQ_DEFAULT_PASS:-admin}
      - WEIXIN_CONFIG_ORIGINALID=${WEIXIN_CONFIG_ORIGINALID:?set WEIXIN_CONFIG_ORIGINALID in docs/tag/v1/.env}
      - WEIXIN_CONFIG_TOKEN=${WEIXIN_CONFIG_TOKEN:?set WEIXIN_CONFIG_TOKEN in docs/tag/v1/.env}
      - WEIXIN_CONFIG_APP_ID=${WEIXIN_CONFIG_APP_ID:?set WEIXIN_CONFIG_APP_ID in docs/tag/v1/.env}
      - WEIXIN_CONFIG_APP_SECRET=${WEIXIN_CONFIG_APP_SECRET:?set WEIXIN_CONFIG_APP_SECRET in docs/tag/v1/.env}
      - WEIXIN_CONFIG_TEMPLATE_ID=${WEIXIN_CONFIG_TEMPLATE_ID:?set WEIXIN_CONFIG_TEMPLATE_ID in docs/tag/v1/.env}
      - ALIPAY_APP_ID=${ALIPAY_APP_ID:?set ALIPAY_APP_ID in docs/tag/v1/.env}
      - ALIPAY_MERCHANT_PRIVATE_KEY=${ALIPAY_MERCHANT_PRIVATE_KEY:?set ALIPAY_MERCHANT_PRIVATE_KEY in docs/tag/v1/.env}
      - ALIPAY_ALIPAY_PUBLIC_KEY=${ALIPAY_ALIPAY_PUBLIC_KEY:?set ALIPAY_ALIPAY_PUBLIC_KEY in docs/tag/v1/.env}
      - ALIPAY_NOTIFY_URL=http://licodetech.top/api/v1/alipay/alipay_notify_url
      - ALIPAY_RETURN_URL=http://licodetech.top
    volumes:
      - ./log:/data/log
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - commerce-network

  # 拼团，负载01
  group-buy-market-01:
    image: lipeicheng/group-buy-market-lpc-app:1.2
    container_name: ai-service-commerce-platform-group-buy-market-01
    restart: on-failure
    ports:
      - "8091:8091"
    environment:
      - TZ=PRC
      - SPRING_PROFILES_ACTIVE=prod
      - SERVER_PORT=8091
      - SPRING_DATASOURCE_USERNAME=${MYSQL_USERNAME:-root}
      - SPRING_DATASOURCE_PASSWORD=${MYSQL_ROOT_PASSWORD:-123456}
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/group_buy_market?characterEncoding=utf8&autoReconnect=true&serverTimezone=Asia/Shanghai
      - SPRING_DATASOURCE_DRIVER_CLASS_NAME=com.mysql.cj.jdbc.Driver
      - SPRING_HIKARI_POOL_NAME=Retail_HikariCP
      - SPRING_RABBITMQ_ADDRESSES=rabbitmq
      - SPRING_RABBITMQ_PORT=5672
      - SPRING_RABBITMQ_USERNAME=${RABBITMQ_DEFAULT_USER:-admin}
      - SPRING_RABBITMQ_PASSWORD=${RABBITMQ_DEFAULT_PASS:-admin}
      - REDIS_SDK_CONFIG_HOST=redis
      - REDIS_SDK_CONFIG_PORT=6379
      - XFG_WRENCH_CONFIG_SYSTEM=group-buy-market
      - XFG_WRENCH_CONFIG_REGISTER_HOST=redis
      - XFG_WRENCH_CONFIG_REGISTER_PORT=6379
      - LOGSTASH_HOST=${LOGSTASH_HOST:-127.0.0.1}
    volumes:
      - ./log:/data/log
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - commerce-network

  # 拼团，负载02
  group-buy-market-02:
    image: lipeicheng/group-buy-market-lpc-app:1.2
    container_name: ai-service-commerce-platform-group-buy-market-02
    restart: on-failure
    ports:
      - "8092:8091"
    environment:
      - TZ=PRC
      - SPRING_PROFILES_ACTIVE=prod
      - SERVER_PORT=8091
      - SPRING_DATASOURCE_USERNAME=${MYSQL_USERNAME:-root}
      - SPRING_DATASOURCE_PASSWORD=${MYSQL_ROOT_PASSWORD:-123456}
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/group_buy_market?characterEncoding=utf8&autoReconnect=true&serverTimezone=Asia/Shanghai
      - SPRING_DATASOURCE_DRIVER_CLASS_NAME=com.mysql.cj.jdbc.Driver
      - SPRING_HIKARI_POOL_NAME=Retail_HikariCP
      - SPRING_RABBITMQ_ADDRESSES=rabbitmq
      - SPRING_RABBITMQ_PORT=5672
      - SPRING_RABBITMQ_USERNAME=${RABBITMQ_DEFAULT_USER:-admin}
      - SPRING_RABBITMQ_PASSWORD=${RABBITMQ_DEFAULT_PASS:-admin}
      - REDIS_SDK_CONFIG_HOST=redis
      - REDIS_SDK_CONFIG_PORT=6379
      - XFG_WRENCH_CONFIG_SYSTEM=group-buy-market
      - XFG_WRENCH_CONFIG_REGISTER_HOST=redis
      - XFG_WRENCH_CONFIG_REGISTER_PORT=6379
      - LOGSTASH_HOST=${LOGSTASH_HOST:-127.0.0.1}
    volumes:
      - ./log:/data/log
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - commerce-network

networks:
  commerce-network:
    name: ai-service-commerce-platform-network
    external: true
