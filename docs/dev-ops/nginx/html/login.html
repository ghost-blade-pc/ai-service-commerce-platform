<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S Pay Mall 商城登录</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-container {
            background-color: #fff;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
            transition: all 0.3s ease;
        }
        .login-container:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
        }
        .login-container h1 {
            margin-bottom: 30px;
            color: #333;
            font-size: 28px;
            font-weight: 600;
        }
        .qr-code {
            margin: 30px 0;
            position: relative;
        }
        .qr-code img {
            width: 200px;
            height: 200px;
            border-radius: 10px;
            transition: all 0.3s ease;
        }
        .qr-code::before {
            content: '';
            position: absolute;
            top: -5px;
            left: -5px;
            right: -5px;
            bottom: -5px;
            background: linear-gradient(45deg, #12c2e9, #c471ed, #f64f59);
            z-index: -1;
            filter: blur(20px);
            border-radius: 15px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .qr-code:hover::before {
            opacity: 1;
        }
        .instructions {
            color: #666;
            font-size: 16px;
            margin-top: 20px;
            line-height: 1.5;
        }
        .logo {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
        }
        @keyframes pulse {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
            100% {
                transform: scale(1);
            }
        }
        .pulse {
            animation: pulse 2s infinite;
        }
    </style>
</head>
<body>
<div class="login-container">
    <img src="./images/logo.png" alt="S Pay Mall Logo" class="logo">
    <h1>欢迎登录 - 小龙拼团</h1>
    <div class="qr-code">
        <img id="qr-code-img" src="images/placeholder.png" alt="微信二维码" class="pulse">
    </div>
    <p class="instructions">请使用微信扫描二维码登录<br>扫码后自动登录商城</p>
</div>

<script>
    // 使用当前 Nginx 同源入口，避免本地测试时绕到远程部署环境
    var sPayMallUrl = "";

    document.addEventListener("DOMContentLoaded", function() {
        const fpPromise = import('./js/v4.js')
            .then(FingerprintJS => FingerprintJS.load());

        fpPromise
            .then(fp => fp.get())
            .then(result => {
                const visitorId = result.visitorId;
                let sceneStr = visitorId.toUpperCase();

                const stealthLoginBtn = document.getElementById('stealth-login-btn');
                if (stealthLoginBtn) {
                    stealthLoginBtn.addEventListener('click', () => {
                        setCookie('loginToken', visitorId, 30);
                        window.location.href = 'index.html';
                    });
                }

                fetch(sPayMallUrl + '/api/v1/login/weixin_qrcode_ticket_scene?sceneStr=' + encodeURIComponent(sceneStr))
                    .then(response => response.json())
                    .then(data => {
                        if (data.code === "0000") {
                            const ticket = data.data;
                            const qrCodeImg = document.getElementById('qr-code-img');

                            qrCodeImg.src = `https://mp.weixin.qq.com/cgi-bin/showqrcode?ticket=${encodeURIComponent(ticket)}`;
                            qrCodeImg.classList.remove('pulse');

                            const intervalId = setInterval(() => {
                                checkLoginStatus(ticket, intervalId);
                            }, 3000);
                        } else {
                            console.error('获取二维码 ticket 失败:', data.info);
                        }
                    })
                    .catch(error => {
                        console.error('请求二维码 ticket 失败:', error);
                    });

                function checkLoginStatus(ticket, intervalId) {
                    fetch(sPayMallUrl + `/api/v1/login/check_login_scene?ticket=${encodeURIComponent(ticket)}&sceneStr=${encodeURIComponent(sceneStr)}`)
                        .then(response => response.json())
                        .then(data => {
                            if (data.code === "0000") {
                                clearInterval(intervalId);
                                setCookie('loginToken', data.data, 30);
                                window.location.href = 'index.html';
                            } else {
                                console.info("login wait");
                            }
                        })
                        .catch(error => {
                            console.error('检查登录状态失败:', error);
                        });
                }

                function setCookie(name, value, days) {
                    const date = new Date();
                    date.setTime(date.getTime() + days * 24 * 60 * 60 * 1000);
                    const expires = "expires=" + date.toUTCString();
                    document.cookie = name + "=" + value + ";" + expires + ";path=/";
                }
            })
            .catch(error => {
                console.error('FingerprintJS 加载失败:', error);
            });
    });
</script>
</body>
</html>
